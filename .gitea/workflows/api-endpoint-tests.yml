      - name: Test Blockchain RPC
        run: |
          echo "=== TESTING BLOCKCHAIN RPC ==="
          cd /opt/aitbc/api-tests-workspace/repo
          source venv/bin/activate
          
          echo "🧪 Testing Blockchain RPC endpoints..."
          
