debianname: audit

on:
  push:
  workflow_dispatch:

jobs:
  audit:
    runs-on: debian

    steps:
      - name: Clone repository
        run: |
          rm -rf repo
          git clone https://gitea.bubuit.net/oib/aitbc.git repo

      - name: Install dependencies
        run: |
          cd repo
          npm install

      - name: Audit dependencies
        run: |
          cd repo
          npm audit || true
