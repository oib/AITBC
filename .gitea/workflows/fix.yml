name: autofix

on:
  push:
  workflow_dispatch:

jobs:
  fix:
    runs-on: debian

    steps:
      - name: Full control execution (nuclear fix)
        run: |
          mkdir -p /opt/gitea-runner/workspace
          cd /opt/gitea-runner/workspace
          rm -rf repo
          git clone https://gitea.bubuit.net/oib/aitbc.git repo
          cd repo
          npm install
          npm audit fix || true
