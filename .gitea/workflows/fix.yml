name: autofix

on:
  push:
  workflow_dispatch:

jobs:
  fix:
    runs-on: debian

    steps:
      - name: Clone repository
        run: |
          rm -rf repo
          git clone https://gitea.bubuit.net/oib/aitbc.git repo

      - name: Install dependencies
        run: |
          cd repo
          npm install

      - name: Auto fix vulnerabilities
        run: |
          cd repo
          npm audit fix || true
