name: Python Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**/*.py'
      - 'packages/py/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.gitea/workflows/python-tests.yml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    runs-on: debian
    timeout-minutes: 15

    steps:
      - name: Clone repository
        run: |
          WORKSPACE="/var/lib/aitbc-workspaces/python-tests"
          rm -rf "$WORKSPACE"
          mkdir -p "$WORKSPACE"
          cd "$WORKSPACE"
          git clone --depth 1 http://gitea.bubuit.net:3000/oib/aitbc.git repo

      - name: Setup Python environment
        run: |
          cd /var/lib/aitbc-workspaces/python-tests/repo

          # Remove any existing venv to avoid cache corruption issues
          rm -rf venv

          # Ensure standard directories exist
          mkdir -p /var/lib/aitbc/data /var/lib/aitbc/keystore /etc/aitbc /var/log/aitbc

          bash scripts/ci/setup-python-venv.sh \
            --repo-dir "$PWD" \
            --venv-dir "$PWD/venv" \
            --skip-requirements \
            --mode copy \
            --extra-packages "pytest pytest-cov pytest-mock pytest-timeout pytest-asyncio locust"
          echo "✅ Python environment ready"

      - name: Run linting
        run: |
          cd /var/lib/aitbc-workspaces/python-tests/repo
          source venv/bin/activate

          if command -v ruff >/dev/null 2>&1; then
            ruff check apps/ packages/py/ --select E,F --ignore E501 -q || echo "⚠️ Ruff warnings"
          fi

          echo "✅ Linting completed"

      - name: Run tests
        run: |
          cd /var/lib/aitbc-workspaces/python-tests/repo
          source venv/bin/activate

          # Install packages in development mode
          pip install -e packages/py/aitbc-crypto/
          pip install -e packages/py/aitbc-sdk/

          export PYTHONPATH="apps/coordinator-api/src:apps/blockchain-node/src:apps/wallet/src:packages/py/aitbc-crypto/src:packages/py/aitbc-sdk/src:."

          # Test if packages are importable
          python3 -c "import aitbc_crypto; print('✅ aitbc_crypto imported')"
          python3 -c "import aitbc_sdk; print('✅ aitbc_sdk imported')"

          pytest tests/archived_phase_tests/ \
            tests/cross_phase/ \
            apps/wallet/tests/ \
            packages/py/aitbc-crypto/tests/ \
            packages/py/aitbc-sdk/tests/ \
            --tb=short -q --timeout=30 --import-mode=importlib

          echo "✅ Python tests completed"

      - name: Cleanup
        if: always()
        run: rm -rf /var/lib/aitbc-workspaces/python-tests
