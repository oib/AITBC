name: debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: debian

    steps:
      - name: DEBUG BEFORE CHECKOUT
        run: |
          echo "=== BEFORE ==="
          pwd
          ls -la

      - name: Checkout
        uses: actions/checkout@v4

      - name: DEBUG AFTER CHECKOUT
        run: |
          echo "=== AFTER ==="
          pwd
          ls -la

      - name: Find package.json
        run: |
          find . -name package.json || true

      - name: Install deps
        run: npm install --legacy-peer-deps
