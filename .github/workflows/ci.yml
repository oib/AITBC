name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: uv run ruff check .

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: uv run black --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: uv run mypy aitbc/ cli/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: uv run pytest --cov=aitbc --cov-report=xml -x

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: pip install bandit semgrep trufflehog
      - run: uv run bandit -r aitbc/ apps/ cli/ -f json -o bandit-report.json
      - run: uv run semgrep --config=auto aitbc/ apps/ cli/ --json --output=semgrep-report.json
      - run: trufflehog git --json --output trufflehog-report.json .
      - name: Check for secrets in code
        run: |
          if git grep -i "private_key\|password\|secret\|api_key\|token" -- '*.py' '*.yaml' '*.yml' '*.json' '*.env.example' | grep -v "test-key\|example\|placeholder\|changeme\|TODO\|FIXME"; then
            echo "Potential secrets found in code"
            exit 1
          fi
      - name: Check for hardcoded mock values
        run: |
          if git grep '"mock_rpc_url"\|"mock_private_key"' -- '*.py'; then
            echo "Hardcoded mock RPC/private key values found in code"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json
            trufflehog-report.json
          retention-days: 30

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: pip install uv
      - name: Install project dependencies
        run: uv sync --dev
      - run: pip install openapi-spec-validator
      - name: Validate coordinator-api OpenAPI spec
        run: |
          cd apps/coordinator-api
          uv run python -c "
          import sys
          sys.path.insert(0, 'src')
          from app.main import create_app
          app = create_app()
          spec = app.openapi()
          from openapi_spec_validator import validate_spec
          validate_spec(spec)
          print('OpenAPI spec is valid')
          "

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: |
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz" | tar xJ
          sudo mv shellcheck-stable/shellcheck /usr/bin/
          shellcheck --version
      - name: Run ShellCheck
        run: |
          shellcheck scripts/**/*.sh

  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Run detect-secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline || true

          # If no baseline exists, create one
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan > .secrets.baseline
            echo "Created initial baseline"
          else
            detect-secrets scan --baseline .secrets.baseline
          fi
