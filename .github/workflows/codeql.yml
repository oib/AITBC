name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: '19 3 * * 1'

jobs:
  analyze:
    name: Analyze (python, js/ts, actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # Explicitly limit analysis to languages present in this repository.
          # Do NOT add rust here unless Rust sources are introduced.
          languages: python,javascript-typescript,actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
