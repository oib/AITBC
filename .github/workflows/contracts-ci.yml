name: Contracts CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Slither Analysis
        run: npm run slither
        # Note: Slither runs locally without any cloud services or API keys

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test
workflow:
  disable: true
