name: Dependency Security Automation

on:
  push:
    branches: [main, develop]
    paths:
      - 'requirements.txt'
      - 'requirements-*.txt'
      - 'pyproject.toml'
      - '.github/workflows/dependency-security.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit pip-audit

      - name: Run pip-audit
        run: |
          echo "=== pip-audit Security Scan ==="
          pip-audit -r requirements.txt --desc
          pip-audit -r requirements.txt --format json --output pip-audit-report.json

      - name: Run safety check
        run: |
          echo "=== Safety Security Scan ==="
          safety check --file requirements.txt --json --output safety-report.json
          safety check --file requirements.txt --output safety-report.txt

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
            safety-report.json
            safety-report.txt
          retention-days: 30

      - name: Create security issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let safetyReport = '';
            let pipAuditReport = '';

            try {
              safetyReport = fs.readFileSync('safety-report.txt', 'utf8');
            } catch (e) {}

            try {
              pipAuditReport = fs.readFileSync('pip-audit-report.json', 'utf8');
            } catch (e) {}

            const body = `
            ## 🔒 Dependency Security Vulnerabilities Detected

            Automated security scan detected vulnerabilities in project dependencies.

            ### Safety Report:
            \`\`\`
            ${safetyReport || 'No safety report available'}
            \`\`\`

            ### pip-audit Report:
            \`\`\`
            ${pipAuditReport || 'No pip-audit report available'}
            \`\`\`

            ### Recommended Actions:
            1. Review the vulnerabilities above
            2. Update affected dependencies to secure versions
            3. Run \`pip install --upgrade <package>\` to update
            4. Test thoroughly after updates
            5. Commit the updated requirements.txt
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Dependency Vulnerabilities Detected',
              body: body,
              labels: ['security', 'dependencies', 'automated']
            });

  dependency-update:
    name: Automated Dependency Updates
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools safety

      - name: Check for outdated dependencies
        run: |
          echo "=== Checking for outdated dependencies ==="
          pip list --outdated --format=json > outdated.json || true
          cat outdated.json || echo "No outdated packages found"

      - name: Update dependencies with safety check
        run: |
          echo "=== Updating dependencies ==="

          # Create backup
          cp requirements.txt requirements.txt.backup

          # Update all packages
          pip install --upgrade -r requirements.txt

          # Freeze updated requirements
          pip freeze > requirements.txt.new

          # Check for security issues in updated dependencies
          echo "=== Security check on updated dependencies ==="
          safety check --file requirements.txt.new

          # Show changes
          echo "=== Dependency Changes ==="
          diff -u requirements.txt.backup requirements.txt.new || true

      - name: Create PR if updates available
        id: create-pr
        run: |
          if [ -f requirements.txt.new ] && [ ! requirements.txt.new -ef requirements.txt ]; then
            mv requirements.txt.new requirements.txt

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b deps/update-$(date +%Y%m%d)
            git add requirements.txt
            git commit -m "deps: update dependencies [skip ci]"
            git push origin deps/update-$(date +%Y%m%d)

            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "No dependency updates needed"
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.create-pr.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'deps: automated dependency updates',
              head: 'deps/update-' + new Date().toISOString().slice(0,10).replace(/-/g,''),
              base: 'main',
              body: '## 🤖 Automated Dependency Updates\n\nThis PR updates project dependencies to their latest versions.\n\n### Security Check\nAll updated dependencies have been scanned for known vulnerabilities using safety.\n\n### Testing\nPlease test thoroughly after merging these updates.',
              labels: ['dependencies', 'automated']
            });

  security-scorecard:
    name: OSSF Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
