repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(svg|png|jpg|ico|woff|woff2|ttf|eot)$
      - id: end-of-file-fixer
        exclude: \.(svg|png|jpg|ico|woff|woff2|ttf|eot)$
      - id: check-yaml
        exclude: apps/blockchain-node/observability/
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
        exclude: cli/templates/.*|tests/cli/.*
      - id: check-toml
      - id: check-xml
      - id: check-case-conflict
      - id: check-ast
        exclude: cli/templates/.*|tests/cli/.*

  # Ruff: linting and formatting (replaces Black, isort, flake8, pydocstyle, pyupgrade)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes, --exit-non-zero-on-fix]
        exclude: cli/templates/.*|tests/cli/.*
        stages: [pre-commit]
      - id: ruff-format
        exclude: cli/templates/.*|tests/cli/.*
        stages: [pre-commit]

  # MyPy type checking on the 12 clean apps
  - repo: local
    hooks:
      - id: mypy-apps
        name: mypy-clean-apps
        entry: bash scripts/ci/mypy-precommit.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Security checks with Bandit (only on pre-push to save time)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, ., -x, cli/templates, tests/cli, tests/]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false
        stages: [pre-push]
