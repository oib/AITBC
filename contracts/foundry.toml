[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"

[profile.default.optimizer]
enabled = true
runs = 200

[profile.default.model_checker]
contracts = { "contracts/AIPowerRental.sol" = ["AIPowerRental"] }
engine = "cheth"
timeout = 10000
targets = ["assert"]

[profile.fuzz]
runs = 1000
max_test_rejects = 65536
