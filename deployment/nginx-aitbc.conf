# AITBC Nginx Configuration
# Routes public services through nginx for SSL termination and security

upstream agent_registry {
    server localhost:8204;
}

upstream api_gateway {
    server localhost:8201;
}

upstream blockchain_rpc {
    server localhost:8202;
}

upstream coordinator_api {
    server localhost:8203;
}

upstream whisper_service {
    server localhost:8110;
}

upstream ollama_service {
    server localhost:11434;
}

server {
    listen 80;
    server_name aitbc3.aitbc.bubuit.net;

    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Agent Registry specific endpoints
    location /agent/health {
        proxy_pass http://agent_registry/agent/health;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /agent/discovery.json {
        proxy_pass http://agent_registry/agent/discovery.json;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /agent/islands.json {
        proxy_pass http://agent_registry/agent/islands.json;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /agent/chains.json {
        proxy_pass http://agent_registry/agent/chains.json;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /agent/join/ {
        proxy_pass http://agent_registry/agent/join/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Agent Registry
    location /agent/ {
        proxy_pass http://agent_registry/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Gateway
    location /api/ {
        proxy_pass http://api_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # Blockchain RPC
    location /rpc/ {
        proxy_pass http://blockchain_rpc/rpc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # Coordinator API (failover)
    location /c/ {
        proxy_pass http://coordinator_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # Whisper transcription service (public, large body for audio uploads)
    location /whisper/ {
        proxy_pass http://whisper_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # Ollama inference service (public)
    location /ollama/ {
        proxy_pass http://ollama_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
    }

    # Health check endpoint
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

