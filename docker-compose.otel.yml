version: '3.8'

services:
  otel-collector:
    build:
      context: .
      dockerfile: Dockerfile.otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
      - "8889:8889"   # Prometheus metrics
    environment:
      - OTEL_LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - aitbc-network

networks:
  aitbc-network:
    driver: bridge
