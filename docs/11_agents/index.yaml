    target_time: "<2s"
    success_rate: ">99%"
  
  resource_discovery:
    target_time: "<500ms"
    result_count: "10-50"
  
  swarm_coordination:
    message_latency: "<100ms"
    consensus_time: "<30s"
  
  api_response:
    average_latency: "<200ms"
    p95_latency: "<500ms"
    success_rate: ">99.9%"

