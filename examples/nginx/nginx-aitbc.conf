# AITBC Nginx Configuration
# Routes public services through nginx for SSL termination and security
#
# Production: /etc/nginx/sites-available/aitbc
# Updated: 2025-01-15

upstream whisper {
    server localhost:8110;
}

upstream api_gateway {
    server localhost:8201;
}

upstream blockchain_rpc {
    server localhost:8202;
}

upstream coordinator_api {
    server localhost:8203;
}

server {
    listen 80 default_server;
    server_name aitbc3.aitbc.bubuit.net;

    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;

    # API Gateway
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blockchain RPC
    location /rpc/ {
        proxy_pass http://blockchain_rpc/rpc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Coordinator API (failover)
    location /c/ {
        proxy_pass http://coordinator_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Whisper transcription service (large audio uploads)
    location /whisper/ {
        client_max_body_size 500M;
        rewrite ^/whisper/(.*) /$1 break;
        proxy_pass http://whisper;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # PeerTube pruner service
    location /peertube/ {
        rewrite ^/peertube/(.*) /$1 break;
        proxy_pass http://localhost:8220;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ollama service (for cloud model access)
    location /ollama/ {
        proxy_pass http://127.0.0.1:11434/;
        proxy_set_header Host "localhost";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

