[project]
name = "aitbc-agent-sdk"
version = "0.1.0"
description = "AITBC Agent SDK"
authors = [
    {name = "AITBC Team", email = "team@aitbc.dev"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "requests>=2.31.0",
    "pydantic>=2.5.0"
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "aitbc_agent", from = "src" }
]
