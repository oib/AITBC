[project]
name = "aitbc-core"
version = "0.1.0"
description = "AITBC Core Utilities"
authors = [
    {name = "AITBC Team", email = "team@aitbc.dev"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=46.0.0",
    "sqlmodel>=0.0.14",
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "redis>=5.0.0",
    "pydantic>=2.5.0"
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "aitbc", from = "src" }
]
