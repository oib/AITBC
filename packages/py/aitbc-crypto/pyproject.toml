[project]
name = "aitbc-crypto"
version = "0.1.0"
description = "AITBC Cryptography"
authors = [
    {name = "AITBC Team", email = "team@aitbc.dev"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=47.0.0",
    "pynacl>=1.5.0"
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "aitbc_crypto", from = "src" }
]
