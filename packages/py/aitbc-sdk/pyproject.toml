[project]
name = "aitbc-sdk"
version = "0.1.0"
description = "AITBC SDK"
authors = [
    {name = "AITBC Team", email = "team@aitbc.dev"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=47.0.0",
    "requests>=2.31.0",
    "pydantic>=2.5.0",
    "httpx>=0.25.0",
    "pynacl>=1.5.0",
    "aitbc-crypto>=0.1.0"
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "aitbc_sdk", from = "src" }
]
