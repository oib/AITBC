warn_return_any = true
warn_unused_configs = true
# Strict mode enabled for maximum type safety
strict = true
extra_checks = true

[[tool.mypy.overrides]]
module = [
    "torch.*",
    "web3.*",
    "eth_account.*",
    "sqlalchemy.*",
]
ignore_missing_imports = true

# Tech debt: these modules still have type errors that require per-file annotation work.
# Tracked in gap analysis. Remove entries as each module is fixed.
# Clean (no override needed): domain.*, schemas.*, auth, exceptions, models.*, storage.*, utils.*
#
# GRADUAL TYPE CHECKING APPROACH (2026-05-31):
# - Critical apps (coordinator-api, blockchain-node, agent-coordinator) have ~1,325 type errors
# - Instead of fixing all at once, we enforce types on NEW/MODIFIED files only
# - Developers should add type annotations to any files they touch
# - Use `mypy --follow-imports=skip <file>` to check individual files during development
#
# NOTE: per-file-ignores in pyproject.toml is NOT supported by mypy 2.0.0
# Instead, # mypy: ignore-errors has been added directly to 73 source files
# See: apps/coordinator-api/src/app/services/tenant_management.py (and 72 others)

# Gradual type checking approach - no apps currently ignored

[tool.ruff]
line-length = 127
target-version = "py313"
extend-exclude = ["cli/templates/handler_template.py", "tests/cli/command_test_template.py"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
    "E722", # bare except (explicitly enforce)
    "G001", # logging statement uses f-string
    "G002", # logging statement uses .format() or % formatting
]
ignore = [
    "E501",  # line too long, handled by black
    "C901",  # too complex
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["B011"]
"cli/templates/handler_template.py" = ["ALL"]
"tests/cli/command_test_template.py" = ["ALL"]

[tool.pydocstyle]
convention = "google"
add_ignore = ["D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
minversion = "8.0"
addopts = "-ra -q --strict-markers --strict-config --cov=aitbc --cov=apps --cov=packages --cov-report=term-missing --cov-report=html:tests/htmlcov --cov-fail-under=50"
testpaths = [
    "tests/unit",
    "tests/integration",
    "tests/e2e",
    "tests/security",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "e2e: marks tests as end-to-end tests",
    "security: marks tests as security tests",
    "contract: marks tests as contract tests",
]

[tool.coverage.run]
source = ["aitbc", "apps", "packages", "cli"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/migrations/*",
    "*/venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
