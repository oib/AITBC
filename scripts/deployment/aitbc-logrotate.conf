# AITBC Service Log Rotation Configuration
# Install to: /etc/logrotate.d/aitbc

# AITBC service log files (services that write to files)
/var/log/aitbc/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 aitbc aitbc
    sharedscripts
    postrotate
        # Reload systemd services to start writing to new log files
        systemctl reload aitbc-miner.service 2>/dev/null || true
    endscript
}

/var/log/aitbc/audit/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 aitbc aitbc
}

/var/log/aitbc/monitoring/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 aitbc aitbc
}

# Systemd journal logs for AITBC services
# Note: Systemd journal is rotated by systemd-journald itself
# Configure journald retention in /etc/systemd/journald.conf:
# SystemMaxUse=1G
# SystemMaxFiles=100
# MaxRetentionSec=1month
