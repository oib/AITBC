<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Block Detail</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            margin: 0;
        }

        .clickable-value {
            cursor: pointer;
            color: var(--primary);
        }
        .clickable-value:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Block Detail</h1>
        </header>

        <div id="loading" class="loading">Loading block...</div>
        <div id="content" style="display:none;">
            <div class="detail-header">
                <span class="badge badge-primary">BLOCK</span>
                <span id="block-height-badge">#--</span>
                <span id="block-hash-display" style="font-size:0.8rem;color:var(--text-muted);font-family:var(--font-mono);"></span>
            </div>

            <div id="block-details"></div>

            <div class="card" style="margin-top:1.5rem;">
                <h2>Transactions <span id="tx-count"></span></h2>
                <div id="tx-list"></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = '/explorer-api';

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="navigator.clipboard.writeText('${text}')" title="Copy">⧉</button>`;
        }

        async function loadBlock() {
            const height = getParam('height');
            const hash = getParam('hash');

            if (!height && !hash) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing block height or hash parameter';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                let data;
                if (height) {
                    const resp = await fetch(`${EXPLORER_API_URL}/api/blocks/${height}`);
                    data = await resp.json();
                } else {
                    const resp = await fetch(`${EXPLORER_API_URL}/api/blocks/by-hash/${hash}`);
                    data = await resp.json();
                }

                if (!data || !data.height) {
                    throw new Error('Block not found');
                }

                document.title = `AITBC Block #${data.height}`;
                document.getElementById('block-height-badge').textContent = `#${data.height}`;
                document.getElementById('block-hash-display').textContent = data.hash || '';

                function linkableHash(hash) {
                    if (!hash || hash === 'N/A') return 'N/A';
                    return `<span class="clickable-value" onclick="navigator.clipboard.writeText('${hash}');this.style.color='var(--success)';setTimeout(()=>this.style.color='',800)" title="Click to copy">${hash}</span>`;
                }
                function linkableAddress(addr) {
                    if (!addr || addr === 'N/A') return 'N/A';
                    return `<a href="/search.html?query=${encodeURIComponent(addr)}" class="clickable-value" title="Search address">${addr}</a>`;
                }

                const details = [
                    { label: 'Height', value: data.height },
                    { label: 'Hash', value: linkableHash(data.hash) + ' ' + copyBtn(data.hash || '') },
                    { label: 'Proposer', value: linkableAddress(data.proposer) + ' ' + copyBtn(data.proposer || '') },
                    { label: 'Timestamp', value: data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A' },
                    { label: 'Transactions', value: data.txCount ?? data.transactions?.length ?? 0 },
                    { label: 'State Root', value: linkableHash(data.stateRoot) + ' ' + copyBtn(data.stateRoot || '') },
                ];

                function addrLink(addr) {
                    if (!addr || addr === 'N/A') return 'N/A';
                    return `<a href="/search.html?query=${encodeURIComponent(addr)}" class="clickable-value">${addr}</a>`;
                }

                document.getElementById('block-details').innerHTML = `
                    <div class="endpoint fade-in block-item" style="padding:0;">
                        <table class="block-list-table">
                            <tr><td>Height</td><td><span class="badge badge-primary">BLOCK</span> #${data.height}</td></tr>
                            <tr><td>Hash</td><td>${linkableHash(data.hash)} ${copyBtn(data.hash || '')}</td></tr>
                            <tr><td>Proposer</td><td>${linkableAddress(data.proposer)} ${copyBtn(data.proposer || '')}</td></tr>
                            <tr><td>Timestamp</td><td>${data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A'}</td></tr>
                            <tr><td>Transactions</td><td>${data.txCount ?? data.transactions?.length ?? 0}</td></tr>
                            <tr><td>State Root</td><td>${linkableHash(data.stateRoot)} ${copyBtn(data.stateRoot || '')}</td></tr>
                        </table>
                    </div>
                `;

                const txs = data.transactions || [];
                document.getElementById('tx-count').textContent = `(${txs.length})`;
                document.getElementById('tx-list').innerHTML = txs.map(tx => {
                    return `
                    <div class="endpoint fade-in block-item" style="cursor:pointer;padding:0;" onclick="location.href='/tx.html?hash=${encodeURIComponent(tx.tx_hash)}'">
                        <table class="block-list-table">
                            <tr><td>Type</td><td><span class="badge badge-primary">${tx.type || 'TX'}</span></td></tr>
                            <tr><td>Hash</td><td>${tx.tx_hash} ${copyBtn(tx.tx_hash)}</td></tr>
                            <tr><td>From</td><td>${addrLink(tx.sender)}</td></tr>
                            <tr><td>To</td><td>${addrLink(tx.recipient)}</td></tr>
                            <tr><td>Status</td><td>${tx.status || 'N/A'}</td></tr>
                            <tr><td>Time</td><td>${tx.created_at ? new Date(tx.created_at).toLocaleString() : 'N/A'}</td></tr>
                        </table>
                    </div>
                    `;
                }).join('') || '<p class="loading-text">No transactions in this block.</p>';

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Failed to load block';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlock);
    </script>
</body>
</html>
