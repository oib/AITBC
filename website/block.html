<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Block Detail</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            margin: 0;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .detail-card {
            background: var(--code);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }
        .detail-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .detail-value {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            word-break: break-all;
        }
        .tx-list {
            margin-top: 1rem;
        }
        .tx-list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        .tx-list-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .tx-list-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Block Detail</h1>
        </header>

        <div id="loading" class="loading">Loading block...</div>
        <div id="content" style="display:none;">
            <div class="detail-header">
                <span class="badge badge-primary" id="block-height-badge">#--</span>
                <span id="block-hash-display" class="detail-value" style="font-size:0.8rem;color:var(--text-muted);"></span>
            </div>

            <div class="detail-grid" id="block-details"></div>

            <div class="card">
                <h2>Transactions <span id="tx-count"></span></h2>
                <div class="tx-list" id="tx-list"></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = 'http://ait-hub.aitbc.bubuit.net:8100';

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="navigator.clipboard.writeText('${text}')" title="Copy">⧉</button>`;
        }

        async function loadBlock() {
            const height = getParam('height');
            const hash = getParam('hash');

            if (!height && !hash) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing block height or hash parameter';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                let data;
                if (height) {
                    const resp = await fetch(`${EXPLORER_API_URL}/api/blocks/${height}`);
                    data = await resp.json();
                } else {
                    const resp = await fetch(`${EXPLORER_API_URL}/api/blocks/by-hash/${hash}`);
                    data = await resp.json();
                }

                if (!data || !data.height) {
                    throw new Error('Block not found');
                }

                document.title = `AITBC Block #${data.height}`;
                document.getElementById('block-height-badge').textContent = `#${data.height}`;
                document.getElementById('block-hash-display').textContent = data.hash || '';

                const details = [
                    { label: 'Height', value: data.height },
                    { label: 'Hash', value: (data.hash || 'N/A') + ' ' + copyBtn(data.hash || '') },
                    { label: 'Proposer', value: (data.proposer || 'N/A') + ' ' + copyBtn(data.proposer || '') },
                    { label: 'Timestamp', value: data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A' },
                    { label: 'Transactions', value: data.txCount ?? data.transactions?.length ?? 0 },
                    { label: 'State Root', value: (data.stateRoot || 'N/A') + ' ' + copyBtn(data.stateRoot || '') },
                ];

                document.getElementById('block-details').innerHTML = details.map(d => `
                    <div class="detail-card">
                        <div class="detail-label">${d.label}</div>
                        <div class="detail-value">${d.value}</div>
                    </div>
                `).join('');

                const txs = data.transactions || [];
                document.getElementById('tx-count').textContent = `(${txs.length})`;
                document.getElementById('tx-list').innerHTML = txs.map(tx => `
                    <div class="tx-list-item" onclick="location.href='/tx.html?hash=${encodeURIComponent(tx.tx_hash)}'">
                        <span class="badge badge-primary">${tx.type || 'TX'}</span>
                        <span style="font-family:var(--font-mono);font-size:0.8rem;flex:1;">${tx.tx_hash}</span>
                        <span style="color:var(--text-muted);font-size:0.75rem;">${tx.sender?.substring(0, 16) || ''}...</span>
                    </div>
                `).join('') || '<p class="loading-text">No transactions in this block.</p>';

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Failed to load block';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlock);
    </script>
</body>
</html>
