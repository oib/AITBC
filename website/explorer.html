<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Blockchain Explorer</title>
    <meta name="description" content="AITBC Blockchain Explorer - Real-time blockchain data visualization">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/style.css">

    <!-- External libraries for explorer functionality -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="explorer.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/exchange.html">Exchange</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>AITBC Blockchain Explorer</h1>
            <p class="subtitle">Real-time blockchain data visualization and search</p>
        </header>

    <div class="container explorer-container">
        <!-- Chain Stats -->
        <div class="grid">
            <div class="card">
                <div class="stat-card">
                    <div>
                        <p class="stat-label">Current Height</p>
                        <p class="endpoint stat-value" id="chain-height">-</p>
                    </div>
                    <div class="stat-icon">
                        <i data-lucide="trending-up" class="icon-md"></i>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="stat-card">
                    <div>
                        <p class="stat-label">Node Status</p>
                        <p class="endpoint node-status-value" id="node-status">-</p>
                    </div>
                    <div class="stat-icon stat-icon-secondary">
                        <i data-lucide="activity" class="icon-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Activity Timeline -->
        <div class="card">
            <div class="blocks-header">
                <h2>Activity Timeline</h2>
            </div>
            <div id="activity-chart-container">
                <canvas id="activity-chart"></canvas>
            </div>
        </div>

        <!-- Live Feed -->
        <div class="card">
            <div class="blocks-header">
                <h2>Live Feed</h2>
                <span class="live-indicator">● LIVE</span>
            </div>
            <div id="live-feed-container">
                <div class="live-feed-list" id="live-feed-list"></div>
            </div>
        </div>

        <!-- Search -->
        <div class="card">
            <div class="search-header">
                <h2>Search</h2>
                <button id="clear-search-btn" class="btn-secondary">
                    <i data-lucide="x" class="icon-sm"></i>
                    Clear
                </button>
            </div>

            <div class="search-row">
                <input type="text" id="search-input" placeholder="Search by block height, hash, or transaction hash"
                       class="endpoint flex-1">
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="card hidden">
            <div class="results-header">
                <h2>Search Results</h2>
                <span id="results-count" class="result-count"></span>
            </div>
            <div id="results-container">
                <!-- Results will be dynamically inserted here -->
            </div>
        </div>

        <!-- Latest Blocks -->
        <div class="card">
            <div class="blocks-header">
                <h2>Latest Blocks</h2>
                <div class="flex-row">
                    <label class="toggle-switch" title="Skip heartbeat blocks (empty)">
                        <input type="checkbox" id="skip-empty-blocks">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">Skip Empty</span>
                    </label>
                    <button id="export-blockchain-btn" class="btn-secondary">
                        <i data-lucide="download" class="icon-sm"></i>
                        Export Blockchain
                    </button>
                </div>
            </div>
            <div id="blocks-container">
                <p class="loading-blocks">Loading blocks...</p>
            </div>
            <div id="load-more-container" style="text-align:center; margin-top:1rem; display:none;">
                <button id="load-more-btn" class="btn-secondary">Load 10 More</button>
            </div>
        </div>
    </div>
</body>
</html>
