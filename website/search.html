<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Search Results</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .search-query {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .section-title {
            margin: 1.5rem 0 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-list {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .detail-list tr {
            border-bottom: 1px solid var(--border);
        }
        .detail-list tr:last-child {
            border-bottom: none;
        }
        .detail-list td {
            padding: 0.5rem 0.75rem;
            vertical-align: top;
        }
        .detail-list td:first-child {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100px;
            white-space: nowrap;
        }
        .detail-list td:last-child {
            font-family: var(--font-mono);
            word-break: break-all;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .list-item a {
            color: var(--text);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            flex: 1;
            word-break: break-all;
        }
        .list-item a:hover {
            text-decoration: underline;
        }
        .clickable-value {
            cursor: pointer;
            color: var(--primary);
        }
        .clickable-value:hover {
            text-decoration: underline;
        }
        .dir-badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .dir-out {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .dir-in {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .dir-self {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Search Results</h1>
        </header>

        <div id="loading" class="loading">Searching...</div>

        <div id="content" style="display:none;">
            <div class="search-query">Query: <span id="query-display"></span></div>

            <div id="blocks-section" style="display:none;">
                <div class="section-title">Blocks</div>
                <div id="blocks-list"></div>
            </div>

            <div id="txs-section" style="display:none;">
                <div class="section-title">Transactions</div>
                <div id="txs-list"></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = '/explorer-api';

        function getParam(name) {
            return new URL(window.location.href).searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="navigator.clipboard.writeText('${text}')" title="Copy">&#x29c9;</button>`;
        }

        function addrLink(addr) {
            if (!addr || addr === 'N/A') return 'N/A';
            return `<a href="/search.html?query=${encodeURIComponent(addr)}" class="clickable-value">${addr}</a>`;
        }

        function hashLink(hash) {
            if (!hash || hash === 'N/A') return 'N/A';
            return `<a href="/tx.html?hash=${encodeURIComponent(hash)}">${hash}</a>`;
        }

        function dirBadge(tx, searchedAddr) {
            if (!searchedAddr) return '';
            const s = (tx.sender || '').toLowerCase();
            const r = (tx.recipient || '').toLowerCase();
            const a = searchedAddr.toLowerCase();
            let dir = '';
            if (s === a && r === a) dir = 'self';
            else if (s === a) dir = 'out';
            else if (r === a) dir = 'in';
            if (!dir) return '';
            const labels = { out: 'OUT →', in: 'IN ←', self: 'SELF ↻' };
            return `<span class="dir-badge dir-${dir}">${labels[dir]}</span>`;
        }

        async function loadSearch() {
            const query = getParam('query') || getParam('search') || '';
            if (!query) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing search query';
                document.getElementById('error').style.display = 'block';
                return;
            }

            document.title = `Search: ${query}`;
            document.getElementById('query-display').textContent = query;

            try {
                const [txResp, blockResp] = await Promise.all([
                    fetch(`${EXPLORER_API_URL}/api/transactions/search?address=${encodeURIComponent(query)}`),
                    fetch(`${EXPLORER_API_URL}/api/blocks/by-address/${encodeURIComponent(query)}`),
                ]);
                const txData = await txResp.json();
                const blockData = await blockResp.json();
                const txs = txData.transactions || [];
                const blocks = blockData.blocks || [];

                if (txs.length === 0 && blocks.length === 0) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').textContent = 'No transactions or blocks found for this query.';
                    document.getElementById('error').style.display = 'block';
                    return;
                }

                // Blocks
                if (blocks.length > 0) {
                    document.getElementById('blocks-section').style.display = 'block';
                    document.getElementById('blocks-list').innerHTML = blocks.map(b => `
                        <table class="detail-list" style="margin-bottom:0.5rem;">
                            <tr><td>Height</td><td><span class="badge badge-primary">BLOCK</span> <a href="/block.html?height=${b.height}">#${b.height}</a></td></tr>
                            <tr><td>Hash</td><td><a href="/block.html?height=${b.height}">${b.hash}</a> ${copyBtn(b.hash || '')}</td></tr>
                            <tr><td>Proposer</td><td>${addrLink(b.proposer)}</td></tr>
                            <tr><td>TXs</td><td>${b.txCount || 0}</td></tr>
                            <tr><td>Time</td><td>${b.timestamp ? new Date(b.timestamp).toLocaleString() : 'N/A'}</td></tr>
                        </table>
                    `).join('');
                }

                // Transactions
                if (txs.length > 0) {
                    document.getElementById('txs-section').style.display = 'block';
                    document.getElementById('txs-list').innerHTML = txs.map(tx => {
                        const dBadge = dirBadge(tx, query);
                        return `
                        <table class="detail-list" style="margin-bottom:0.5rem;">
                            <tr><td>Type</td><td><span class="badge badge-primary">${tx.type || 'TX'}</span> ${dBadge}</td></tr>
                            <tr><td>Hash</td><td>${hashLink(tx.tx_hash)} ${copyBtn(tx.tx_hash || '')}</td></tr>
                            <tr><td>From</td><td>${addrLink(tx.sender)}</td></tr>
                            <tr><td>To</td><td>${addrLink(tx.recipient)}</td></tr>
                            <tr><td>Block</td><td><a href="/block.html?height=${tx.block_height}">${tx.block_height}</a></td></tr>
                            <tr><td>Status</td><td>${tx.status || 'N/A'}</td></tr>
                            <tr><td>Time</td><td>${tx.created_at ? new Date(tx.created_at).toLocaleString() : 'N/A'}</td></tr>
                        </table>
                        `;
                    }).join('');
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Search failed';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadSearch);
    </script>
</body>
</html>
