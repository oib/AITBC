<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Search Results</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .search-query {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .section-title {
            margin: 1.5rem 0 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .dir-badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .dir-out { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .dir-in { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .dir-self { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Search Results</h1>
        </header>

        <div id="loading" class="loading">Searching...</div>

        <div id="content" style="display:none;">
            <div class="search-query">Query: <span id="query-display"></span></div>

            <div id="blocks-section" style="display:none;">
                <div class="section-title">Blocks</div>
                <div id="blocks-list"></div>
            </div>

            <div id="txs-section" style="display:none;">
                <div class="section-title">Transactions</div>
                <div id="txs-list"></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = '/explorer-api';

        function getParam(name) {
            return new URL(window.location.href).searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="event.stopPropagation();navigator.clipboard.writeText('${text}')" title="Copy">&#x29c9;</button>`;
        }

        function addrLink(addr) {
            if (!addr || addr === 'N/A') return 'N/A';
            return `<a href="/search.html?query=${encodeURIComponent(addr)}" class="clickable-value">${addr}</a>`;
        }

        function hashLink(hash) {
            if (!hash || hash === 'N/A') return 'N/A';
            return `<a href="/tx.html?hash=${encodeURIComponent(hash)}">${hash}</a>`;
        }

        function dirBadge(tx, searchedAddr) {
            if (!searchedAddr) return '';
            const s = (tx.sender || '').toLowerCase();
            const r = (tx.recipient || '').toLowerCase();
            const a = searchedAddr.toLowerCase();
            let dir = '';
            if (s === a && r === a) dir = 'self';
            else if (s === a) dir = 'out';
            else if (r === a) dir = 'in';
            if (!dir) return '';
            const labels = { out: 'OUT &rarr;', in: 'IN &larr;', self: 'SELF &orarr;' };
            return `<span class="dir-badge dir-${dir}">${labels[dir]}</span>`;
        }

        async function loadSearch() {
            const query = getParam('query') || getParam('search') || '';
            if (!query) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing search query';
                document.getElementById('error').style.display = 'block';
                return;
            }

            // Smart redirect for block heights and hashes
            const cleanQuery = query.replace(/^#/, '');
            const isNumber = /^\d+$/.test(cleanQuery);
            const isHash = /^(0x)?[a-fA-F0-9]{64}$/.test(cleanQuery);

            if (isNumber) {
                location.href = `/block.html?height=${cleanQuery}`;
                return;
            }
            if (isHash) {
                location.href = `/tx.html?hash=${encodeURIComponent(cleanQuery)}`;
                return;
            }

            document.title = `Search: ${query}`;
            document.getElementById('query-display').textContent = query;

            try {
                const [txResp, blockResp] = await Promise.all([
                    fetch(`${EXPLORER_API_URL}/api/transactions/search?address=${encodeURIComponent(query)}&limit=50`),
                    fetch(`${EXPLORER_API_URL}/api/blocks/by-address/${encodeURIComponent(query)}&limit=50`),
                ]);
                const txData = await txResp.json();
                const blockData = await blockResp.json();
                const txs = txData.transactions || [];
                const blocks = blockData.blocks || [];

                if (txs.length === 0 && blocks.length === 0) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').textContent = 'No transactions or blocks found for this query.';
                    document.getElementById('error').style.display = 'block';
                    return;
                }

                if (blocks.length > 0) {
                    document.getElementById('blocks-section').style.display = 'block';
                    document.getElementById('blocks-list').innerHTML = blocks.map(b => `
                        <div class="endpoint fade-in block-item" style="cursor:pointer;padding:0;" onclick="location.href='/block.html?height=${b.height}'">
                            <table class="block-list-table">
                                <tr><td>Height</td><td><span class="badge badge-primary">BLOCK</span> #${b.height}</td></tr>
                                <tr><td>Hash</td><td>${b.hash || 'N/A'} ${copyBtn(b.hash || '')}</td></tr>
                                <tr><td>Proposer</td><td>${addrLink(b.proposer)}</td></tr>
                                <tr><td>Transactions</td><td>${b.txCount || 0}</td></tr>
                                <tr><td>Timestamp</td><td>${b.timestamp ? new Date(b.timestamp).toLocaleString() : 'N/A'}</td></tr>
                            </table>
                        </div>
                    `).join('');
                }

                if (txs.length > 0) {
                    document.getElementById('txs-section').style.display = 'block';
                    document.getElementById('txs-list').innerHTML = txs.map(tx => {
                        const dBadge = dirBadge(tx, query);
                        return `
                        <div class="endpoint fade-in block-item" style="cursor:pointer;padding:0;" onclick="location.href='/tx.html?hash=${encodeURIComponent(tx.tx_hash)}'">
                            <table class="block-list-table">
                                <tr><td>Type</td><td><span class="badge badge-primary">${tx.type || 'TX'}</span> ${dBadge}</td></tr>
                                <tr><td>Hash</td><td>${tx.tx_hash || 'N/A'} ${copyBtn(tx.tx_hash || '')}</td></tr>
                                <tr><td>From</td><td>${addrLink(tx.sender)}</td></tr>
                                <tr><td>To</td><td>${addrLink(tx.recipient)}</td></tr>
                                <tr><td>Block</td><td><a href="/block.html?height=${tx.block_height}">${tx.block_height}</a></td></tr>
                                <tr><td>Status</td><td>${tx.status || 'N/A'}</td></tr>
                                <tr><td>Time</td><td>${tx.created_at ? new Date(tx.created_at).toLocaleString() : 'N/A'}</td></tr>
                            </table>
                        </div>
                        `;
                    }).join('');
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Search failed';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadSearch);
    </script>
</body>
</html>
