<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Transaction Detail</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            margin: 0;
        }
        .detail-list {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .detail-list tr {
            border-bottom: 1px solid var(--border);
        }
        .detail-list tr:last-child {
            border-bottom: none;
        }
        .detail-list td {
            padding: 0.6rem 0.75rem;
            vertical-align: top;
        }
        .detail-list td:first-child {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 140px;
            white-space: nowrap;
        }
        .detail-list td:last-child {
            font-family: var(--font-mono);
            word-break: break-all;
        }
        .payload-box {
            background: var(--code);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
        }
        .payload-box pre {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text);
        }
        .clickable-value {
            cursor: pointer;
            color: var(--primary);
        }
        .clickable-value:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Transaction Detail</h1>
        </header>

        <div id="loading" class="loading">Loading transaction...</div>
        <div id="content" style="display:none;">
            <div class="detail-header">
                <span class="badge badge-primary" id="tx-type-badge">TX</span>
                <span id="tx-hash-display" class="detail-value" style="font-size:0.8rem;color:var(--text-muted);"></span>
            </div>

            <table class="detail-list" id="tx-details"></table>

            <div class="card" id="payload-card" style="display:none;">
                <h2>Payload</h2>
                <div class="payload-box"><pre id="payload-content"></pre></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = '/explorer-api';

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="navigator.clipboard.writeText('${text}')" title="Copy">⧉</button>`;
        }

        async function loadTransaction() {
            const hash = getParam('hash');

            if (!hash) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing transaction hash parameter';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                const resp = await fetch(`${EXPLORER_API_URL}/api/transactions/${hash}`);
                const data = await resp.json();

                if (!data || !data.hash) {
                    throw new Error('Transaction not found');
                }

                document.title = `AITBC TX ${data.hash.substring(0, 16)}...`;
                document.getElementById('tx-type-badge').textContent = data.type || 'TX';
                document.getElementById('tx-hash-display').textContent = data.hash;

                function linkableHash(hash) {
                    if (!hash || hash === 'N/A') return 'N/A';
                    return `<span class="clickable-value" onclick="navigator.clipboard.writeText('${hash}');this.style.color='var(--success)';setTimeout(()=>this.style.color='',800)" title="Click to copy">${hash}</span>`;
                }
                function linkableAddress(addr) {
                    if (!addr || addr === 'N/A') return 'N/A';
                    return `<a href="/explorer.html?search=${encodeURIComponent(addr)}" class="clickable-value" title="Search address">${addr}</a>`;
                }

                const details = [
                    { label: 'Hash', value: linkableHash(data.hash) + ' ' + copyBtn(data.hash) },
                    { label: 'Type', value: data.type || 'Unknown' },
                    { label: 'Status', value: data.status || 'Unknown' },
                    { label: 'Block Height', value: `<a href="/block.html?height=${data.block_height}">${data.block_height}</a>` },
                    { label: 'From', value: linkableAddress(data.from || data.sender) + ' ' + copyBtn(data.from || data.sender || '') },
                    { label: 'To', value: linkableAddress(data.to || data.recipient) + ' ' + copyBtn(data.to || data.recipient || '') },
                    { label: 'Value', value: data.value !== undefined ? data.value : 'N/A' },
                    { label: 'Fee', value: data.fee !== undefined ? data.fee : 'N/A' },
                    { label: 'Nonce', value: data.nonce !== undefined ? data.nonce : 'N/A' },
                    { label: 'Timestamp', value: data.created_at ? new Date(data.created_at).toLocaleString() : 'N/A' },
                ];

                document.getElementById('tx-details').innerHTML = details.map(d => `
                    <tr><td>${d.label}</td><td>${d.value}</td></tr>
                `).join('');

                if (data.payload) {
                    let payloadText;
                    try {
                        payloadText = JSON.stringify(typeof data.payload === 'string' ? JSON.parse(data.payload) : data.payload, null, 2);
                    } catch (e) {
                        payloadText = String(data.payload);
                    }
                    document.getElementById('payload-content').textContent = payloadText;
                    document.getElementById('payload-card').style.display = 'block';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Failed to load transaction';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadTransaction);
    </script>
</body>
</html>
