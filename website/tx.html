<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITBC Transaction Detail</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            margin: 0;
        }
        .payload-box {
            background: var(--code);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
        }
        .payload-box pre {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text);
        }
        .clickable-value {
            cursor: pointer;
            color: var(--primary);
        }
        .clickable-value:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <a href="/">Home</a>
                <a href="/explorer.html">Explorer</a>
                <a href="/marketplace.html">Marketplace</a>
            </div>
            <h1>Transaction Detail</h1>
        </header>

        <div id="loading" class="loading">Loading transaction...</div>
        <div id="content" style="display:none;">
            <div class="detail-header">
                <span class="badge badge-primary" id="tx-type-badge">TX</span>
                <span id="tx-hash-display" style="font-size:0.8rem;color:var(--text-muted);font-family:var(--font-mono);"></span>
            </div>

            <div id="tx-details"></div>

            <div class="card" id="payload-card" style="display:none;margin-top:1.5rem;">
                <h2>Payload</h2>
                <div class="payload-box"><pre id="payload-content"></pre></div>
            </div>
        </div>

        <div id="error" class="loading" style="display:none; color:#ef4444;"></div>
    </div>

    <script>
        const EXPLORER_API_URL = '/explorer-api';

        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function copyBtn(text) {
            return `<button class="copy-btn" onclick="event.stopPropagation();navigator.clipboard.writeText('${text}')" title="Copy">⧉</button>`;
        }

        function plainHash(hash) {
            if (!hash || hash === 'N/A') return 'N/A';
            return `<span style="font-family:var(--font-mono);">${hash}</span>`;
        }

        function addrLink(addr) {
            if (!addr || addr === 'N/A') return 'N/A';
            return `<a href="/search.html?query=${encodeURIComponent(addr)}" class="clickable-value" title="Search address">${addr}</a>`;
        }

        async function loadTransaction() {
            const hash = getParam('hash');

            if (!hash) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Missing transaction hash parameter';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                const resp = await fetch(`${EXPLORER_API_URL}/api/transactions/${hash}`);
                const data = await resp.json();

                if (!data || !data.hash) {
                    // Not a tx hash — try as block hash and redirect if found
                    const blockResp = await fetch(`${EXPLORER_API_URL}/api/blocks/by-hash/${hash}`);
                    const blockData = await blockResp.json();
                    if (blockData && blockData.height) {
                        location.href = `/block.html?height=${blockData.height}`;
                        return;
                    }
                    throw new Error('No transaction or block found for this hash');
                }

                document.title = `AITBC TX ${data.hash.substring(0, 16)}...`;
                document.getElementById('tx-type-badge').textContent = data.type || 'TX';
                document.getElementById('tx-hash-display').textContent = data.hash;

                const details = [
                    { label: 'Type', value: `<span class="badge badge-primary">${data.type || 'TX'}</span>` },
                    { label: 'Hash', value: plainHash(data.hash) + ' ' + copyBtn(data.hash) },
                    { label: 'Status', value: data.status || 'Unknown' },
                    { label: 'Block', value: `<a href="/block.html?height=${data.block_height}">#${data.block_height}</a>` },
                    { label: 'From', value: addrLink(data.from || data.sender) + ' ' + copyBtn(data.from || data.sender || '') },
                    { label: 'To', value: addrLink(data.to || data.recipient) + ' ' + copyBtn(data.to || data.recipient || '') },
                    { label: 'Value', value: data.value !== undefined ? data.value : 'N/A' },
                    { label: 'Fee', value: data.fee !== undefined ? data.fee : 'N/A' },
                    { label: 'Nonce', value: data.nonce !== undefined ? data.nonce : 'N/A' },
                    { label: 'Timestamp', value: data.created_at ? new Date(data.created_at).toLocaleString() : 'N/A' },
                ];

                document.getElementById('tx-details').innerHTML = `
                    <div class="endpoint fade-in block-item" style="padding:0;">
                        <table class="block-list-table">
                            ${details.map(d => `<tr><td>${d.label}</td><td>${d.value}</td></tr>`).join('')}
                        </table>
                    </div>
                `;

                if (data.payload) {
                    let payloadText;
                    try {
                        payloadText = JSON.stringify(typeof data.payload === 'string' ? JSON.parse(data.payload) : data.payload, null, 2);
                    } catch (e) {
                        payloadText = String(data.payload);
                    }
                    document.getElementById('payload-content').textContent = payloadText;
                    document.getElementById('payload-card').style.display = 'block';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = err.message || 'Failed to load transaction';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadTransaction);
    </script>
</body>
</html>
